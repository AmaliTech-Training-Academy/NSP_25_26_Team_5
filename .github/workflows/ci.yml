name: CI Pipeline

on:
  push:
    branches: [main, dev, staging]
  pull_request:
    branches: [main, dev, staging]

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: communityboard
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Build backend
        working-directory: ./backend
        run: mvn clean compile -B

      - name: Run backend unit tests
        working-directory: ./backend
        run: mvn test -B
        env:
          SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.POSTGRES_USER }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  api-tests:
    name: API Tests (QA)
    runs-on: ubuntu-latest
    needs: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: communityboard
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Build backend (skip tests)
        working-directory: ./backend
        run: mvn clean install -DskipTests -B

      - name: Start Spring Boot backend
        working-directory: ./backend
        run: |
          mvn spring-boot:run \
            --no-transfer-progress \
            -Dspring-boot.run.arguments="
              --spring.datasource.url=jdbc:postgresql://localhost:5432/communityboard
              --spring.datasource.username=${{ secrets.POSTGRES_USER }}
              --spring.datasource.password=${{ secrets.POSTGRES_PASSWORD }}
              --spring.jpa.hibernate.ddl-auto=create-drop" &
          echo "Waiting for backend to be ready..."
          for i in {1..30}; do
            curl -sf http://localhost:8080/api/auth/login \
              -H "Content-Type: application/json" \
              -d '{"email":"x","password":"x"}' \
              -o /dev/null && echo "Backend is up" && break
            echo "Attempt $i — retrying in 5s..."
            sleep 5
          done

      - name: Run API tests
        working-directory: qa/api-tests
        run: mvn test -B -Dmaven.test.failure.ignore=true

      - name: Generate Allure Report
        if: always()
        working-directory: qa/api-tests
        run: mvn allure:report --no-transfer-progress

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_number }}
          path: qa/api-tests/target/site/allure-maven-plugin/
          retention-days: 14

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ github.run_number }}
          path: qa/api-tests/target/surefire-reports/
          retention-days: 14

      - name: Print test summary
        if: always()
        working-directory: qa/api-tests
        run: |
          echo "========================================="
          echo "           API TEST RESULTS SUMMARY     "
          echo "========================================="
          grep -h "Tests run:" target/surefire-reports/*.txt 2>/dev/null \
            || echo "No surefire reports found"
          echo "========================================="

