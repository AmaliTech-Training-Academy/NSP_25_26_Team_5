  docker-build-scan:
    name: Build & Scan Docker Image
    runs-on: ubuntu-latest
    needs: [backend, frontend, codeql]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t communityboard-backend:${{ github.sha }} ./backend