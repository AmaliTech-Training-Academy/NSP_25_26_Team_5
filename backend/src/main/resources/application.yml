spring:
  profiles:
    active: dev   # default profile

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/communityboard}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  sql:
    init:
      mode: always

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

jwt:
  secret: ${JWT_SECRET:communityboard-secret-key-amalitech-2024}
  expiration: 86400000   # 24 hours in milliseconds

# AWS SNS for category email notifications (optional: set AWS_REGION and credentials)
aws:
  region: ${AWS_REGION:eu-north-1}
  sns:
    topic-prefix: ${AWS_SNS_TOPIC_PREFIX:communityboard}

# Base URL of the frontend (for "View post" link in notification emails). No trailing slash.
app:
  base-url: ${APP_BASE_URL:}

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
