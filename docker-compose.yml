version: "3.8"
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: communityboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/communityboard
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: communityboard-secret-key-amalitech-2024
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ── Data Engineering Services ─────────────────────────────────────────────
  # Credentials come exclusively from env_file — zero hardcoded secrets.

  data-seed:
    build: ./data-engineering
    command: ["python", "seed_data.py"]
    env_file: ./data-engineering/.env
    depends_on:
      backend:
        condition: service_started
    restart: "no"

  data-etl:
    build: ./data-engineering
    command: ["python", "etl_pipeline.py"]
    env_file: ./data-engineering/.env
    depends_on:
      data-seed:
        condition: service_completed_successfully
    restart: "no"

  data-dashboard:
    build: ./data-engineering
    command:
      - streamlit
      - run
      - dashboard.py
      - "--server.port=8501"
      - "--server.address=0.0.0.0"
      - "--server.headless=true"
    ports:
      - "8501:8501"
    env_file: ./data-engineering/.env
    depends_on:
      data-etl:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
